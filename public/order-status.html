<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تتبع طلبك - مطعم ومطبخ العائلة</title>
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C; --gold-light: #E8C97A; --dark: #0D0D0D;
    --dark2: #151515; --dark3: #1E1E1E; --cream: #F5EDD6;
    --text: #E8DCC8; --text-dim: #9B9080;
    --green: #27AE60; --orange: #E67E22; --blue: #2980B9; --red: #C0392B;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Cairo',sans-serif; background:var(--dark); color:var(--text);
    min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:24px;
  }
  .card {
    background:var(--dark3); border:1px solid rgba(201,168,76,0.2);
    border-radius:24px; padding:40px; width:min(520px, 100%);
    text-align:center;
  }
  .logo {
    font-family:'Scheherazade New',serif; font-size:1.8rem; color:var(--gold);
    margin-bottom:4px;
  }
  .subtitle { font-size:0.8rem; color:var(--text-dim); margin-bottom:32px; }
  .order-badge {
    display:inline-block; background:rgba(201,168,76,0.1);
    border:1px solid rgba(201,168,76,0.3); color:var(--gold);
    font-size:1.5rem; font-weight:900; padding:12px 32px; border-radius:14px;
    margin-bottom:32px;
  }
  .status-steps {
    display:flex; flex-direction:column; gap:0; position:relative; margin:32px 0; text-align:right;
  }
  .step {
    display:flex; align-items:center; gap:16px; padding:16px 0; position:relative;
  }
  .step-icon {
    width:48px; height:48px; border-radius:50%;
    border:2px solid rgba(201,168,76,0.2);
    display:flex; align-items:center; justify-content:center;
    font-size:1.4rem; background:var(--dark); flex-shrink:0;
    transition:all 0.4s; position:relative; z-index:2;
  }
  .step.done .step-icon { background:rgba(201,168,76,0.15); border-color:var(--gold); }
  .step.current .step-icon {
    background:var(--gold); border-color:var(--gold-light);
    box-shadow:0 0 20px rgba(201,168,76,0.5);
    animation:pulse 2s ease infinite;
  }
  @keyframes pulse { 0%,100%{box-shadow:0 0 20px rgba(201,168,76,0.5)} 50%{box-shadow:0 0 35px rgba(201,168,76,0.8)} }
  .step-line {
    position:absolute; right:23px; top:0; bottom:0; width:2px;
    background:rgba(201,168,76,0.1); z-index:1;
  }
  .step:first-child .step-line { top:50%; }
  .step:last-child .step-line { bottom:50%; }
  .step.done .step-line { background:rgba(201,168,76,0.3); }
  .step-text .title { font-weight:700; color:var(--cream); }
  .step.done .step-text .title { color:var(--gold); }
  .step-text .desc { font-size:0.8rem; color:var(--text-dim); margin-top:2px; }

  .status-rejected {
    text-align:center; padding:32px;
    background:rgba(192,57,43,0.1); border-radius:16px; border:1px solid rgba(192,57,43,0.3);
    margin:24px 0;
  }
  .status-rejected .icon { font-size:3rem; margin-bottom:12px; }
  .status-rejected h3 { color:var(--red); font-size:1.3rem; }
  .status-rejected p { color:var(--text-dim); font-size:0.85rem; margin-top:8px; }

  .back-btn {
    display:inline-block; margin-top:24px; padding:12px 32px; border-radius:50px;
    background:rgba(201,168,76,0.1); border:1.5px solid rgba(201,168,76,0.3);
    color:var(--gold); font-weight:700; font-family:'Cairo',sans-serif;
    cursor:pointer; transition:all 0.2s; text-decoration:none;
  }
  .back-btn:hover { background:var(--gold); color:var(--dark); }

  .loading { color:var(--text-dim); font-size:0.9rem; padding:40px; }
  .error { color:var(--red); padding:20px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">مطعم ومطبخ العائلة</div>
  <div class="subtitle">تتبع حالة طلبك</div>
  <div id="content" class="loading">⏳ جاري تحميل حالة طلبك...</div>
</div>

<script>
const orderId = new URLSearchParams(window.location.search).get('id');

const steps = [
  { key: 'pending', icon: '📋', title: 'تم استلام طلبك', desc: 'يتم مراجعة طلبك من قبل المطعم' },
  { key: 'approved', icon: '🔥', title: 'قيد التحضير', desc: 'طاقم المطبخ يعمل على إعداد طلبك' },
  { key: 'ready', icon: '✅', title: 'جاهز!', desc: 'طلبك جاهز للاستلام أو التوصيل' },
];

const statusOrder = ['pending', 'approved', 'ready'];

async function loadStatus() {
  if (!orderId) {
    document.getElementById('content').innerHTML = '<p class="error">❌ رقم الطلب غير صحيح</p>';
    return;
  }
  try {
    const res = await fetch(`/api/orders/${orderId}/status`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    renderStatus(data);
  } catch {
    document.getElementById('content').innerHTML = '<p class="error">❌ لم يتم العثور على الطلب</p>';
  }
}

function renderStatus({ status, orderNumber }) {
  if (status === 'rejected') {
    document.getElementById('content').innerHTML = `
      <div class="order-badge">${orderNumber}</div>
      <div class="status-rejected">
        <div class="icon">😔</div>
        <h3>تم رفض الطلب</h3>
        <p>نأسف، تم رفض طلبك. يمكنك التواصل معنا لمعرفة السبب.</p>
      </div>
      <a href="/" class="back-btn">🔙 العودة للقائمة</a>`;
    return;
  }

  const currentIdx = statusOrder.indexOf(status);

  let html = `<div class="order-badge">${orderNumber}</div>`;
  html += '<div class="status-steps">';
  steps.forEach((step, i) => {
    const isDone = i < currentIdx;
    const isCurrent = i === currentIdx;
    const isUpcoming = i > currentIdx;
    html += `
    <div class="step ${isDone?'done':isCurrent?'current':''}">
      <div class="step-line"></div>
      <div class="step-icon" style="${isUpcoming?'opacity:0.3':''}">
        ${isDone ? '✓' : step.icon}
      </div>
      <div class="step-text">
        <div class="title" style="${isUpcoming?'color:var(--text-dim)':''}">${step.title}</div>
        <div class="desc">${isCurrent ? step.desc : isDone ? 'تم ✓' : 'انتظر دورك...'}</div>
      </div>
    </div>`;
  });
  html += '</div>';
  html += '<a href="/" class="back-btn">🍽️ تصفح القائمة مجدداً</a>';
  document.getElementById('content').innerHTML = html;

  // Auto-refresh
  if (status !== 'ready') setTimeout(loadStatus, 15000);
}

loadStatus();
</script>
</body>
</html>
